# Perfil para deploy MVP (Docker na VM, atrás de Nginx em /api).
# Variáveis críticas: PUBLIC_IP, KEYCLOAK_ISSUER_URI, SPRING_DATASOURCE_* , VOUCHER_TOKEN_SECRET
spring:
  config:
    activate:
      on-profile: lightsail

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/voucherdb}
    username: ${SPRING_DATASOURCE_USERNAME:voucher}
    password: ${SPRING_DATASOURCE_PASSWORD:voucher}
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      resourceserver:
        jwt:
          # Tem de ser EXATAMENTE o claim "iss" dos JWT (URL pública + /auth/realms/gifto).
          # Se mudares o IP da VM, atualiza KEYCLOAK_ISSUER_URI e o front (VITE_*).
          issuer-uri: ${KEYCLOAK_ISSUER_URI:}
          # JWKS via rede Docker (evita hairpin NAT ao IP público da própria VM).
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/auth/realms/gifto/protocol/openid-connect/certs}

app:
  keycloak:
    admin:
      server-url: ${KEYCLOAK_ADMIN_SERVER_URL:http://keycloak:8080/auth}
      realm: ${KEYCLOAK_ADMIN_REALM:gifto}
      client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:gifto-core-admin}
      client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
      roles-client-id: ${KEYCLOAK_ADMIN_ROLES_CLIENT_ID:voucher-platform-api}
      provisioning:
        initial-password: ${KEYCLOAK_USER_INITIAL_PASSWORD:changeme}
        # false = MVP (senha definitiva). true = UPDATE_PASSWORD no 1º login.
        temporary-password: ${KEYCLOAK_USER_TEMPORARY_PASSWORD:false}
  storage:
    s3:
      bucket: ${APP_STORAGE_S3_BUCKET:}
      region: ${APP_STORAGE_S3_REGION:us-east-1}
      public-base-url: ${APP_STORAGE_S3_PUBLIC_BASE_URL:}
      access-key-id: ${AWS_ACCESS_KEY_ID:}
      secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  security:
    keycloak:
      issuer-uri: ${KEYCLOAK_ISSUER_URI:}
      client-id: ${KEYCLOAK_CLIENT_ID:voucher-platform-api}
      roles-client-id: ${KEYCLOAK_ROLES_CLIENT_ID:${app.security.keycloak.client-id}}
    cors:
      allowed-origins: []
      allowed-origin-patterns:
        # Browser chamando a API no mesmo host (IP público Lightsail), ex.: http://203.0.113.10:3000
        - "http://${PUBLIC_IP}:*"
      allowed-methods: [ "GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS" ]
      allowed-headers: [ "*" ]
      exposed-headers: [ "*" ]
      allow-credentials: false
      max-age-seconds: 3600
