spring:
  application:
    name: core

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:postgresql://localhost:5432/voucherdb
    username: voucher
    password: voucher
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${app.security.keycloak.issuer-uri:}

server:
  port: 8080
  shutdown: graceful
  error:
    include-message: always

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

app:
  security:
    enabled: true
    keycloak:
      issuer-uri: ${KEYCLOAK_ISSUER_URI:}
      client-id: ${KEYCLOAK_CLIENT_ID:voucher-platform-api}
      roles-client-id: ${KEYCLOAK_ROLES_CLIENT_ID:${app.security.keycloak.client-id}}
    cors:
      allowed-origins: []
      allowed-origin-patterns:
        - "http://localhost:*"
        - "http://127.0.0.1:*"
      allowed-methods: [ "GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS" ]
      allowed-headers: [ "*" ]
      exposed-headers: [ "*" ]
      allow-credentials: false
      max-age-seconds: 3600
  voucher:
    token:
      secret: ${VOUCHER_TOKEN_SECRET:change-me-dev-secret}
      bytes: 16
      version: 1
    display-code:
      length: 8