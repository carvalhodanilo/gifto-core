services:
  postgres:
    image: postgres:16-alpine
    container_name: voucher-postgres
    environment:
      POSTGRES_DB: voucherdb
      POSTGRES_USER: voucher
      POSTGRES_PASSWORD: voucher
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - voucher_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voucher -d voucherdb"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  voucher_pg_data:
